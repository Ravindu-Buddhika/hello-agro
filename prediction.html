<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Price Prediction - GreenMarket</title>

        <link rel="stylesheet" href="style.css">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #000;
            margin: 0;
        }

        /* Navbar එකේ පරතරය වැඩි කිරීම */
        .navbar {
            position: relative !important;
            padding: 40px 60px 40px 60px !important; /* පහළට 40px ක ඉඩක් දුන්නා */
        }

        .prediction-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0 60px 20px 60px;
            justify-content: space-between;
        }

        /* Search Section එක Navbar එකෙන් ඈත් කිරීම */
        .search-section {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px; /* Search bar සහ Chart අතර ඉඩ */
        }

        .search-label { 
            font-size: 18px; 
            color: white;
            font-weight: 400;
        }

        /* Chart Wrapper */
        .chart-wrapper {
            background: transparent;
            border: 1px solid #333333;
            border-radius: 40px;
            padding: 25px;
            flex: 1;
            max-height: 380px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Prediction Cards */
        .prediction-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 25px;
        }

        .p-card {
            background-color: #1e5d03; 
            border-radius: 15px;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .p-info h3 { font-size: 32px; margin: 0; font-weight: 500; }
        .p-info p { font-size: 18px; margin: 5px 0 0 0; opacity: 0.8; }
        .p-price { font-size: 50px; font-weight: 300; margin: 0; }

        .disclaimer {
            text-align: center;
            font-size: 12px;
            color: #555;
            margin-top: 15px;
        }
    </style>
    </head>
    <body>

        <nav class="navbar">
            <div class="nav-links">
                <a href="climate.html">Climate</a>
                <a href="market.html">Market</a>
                <a href="prediction.html" class="active">Prediction</a>
                <a href="chat.html">AI Chat</a>
                <a href="camera.html">Camara</a>
            </div>
        </nav>

        <div class="prediction-container">
            <!-- Search Section -->
            <div class="search-section">
                <span class="search-label">Product</span>
                <div class="search-box"
                    style="display: flex; align-items: center; background: rgba(255, 255, 255, 0.05); border: 1px solid #444; border-radius: 12px; padding: 5px 5px 5px 15px;">
                    <input type="text" id="productSearch" placeholder="Beans"
                        style="border: none; outline: none; background: transparent; color: white; width: 180px; font-size: 16px;">

                    <!-- අලුත් Search Button එක -->
                    <button onclick="generatePrediction()"
                        style="background-color: #1e5d03; color: white; border: none; border-radius: 8px; padding: 8px 20px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; transition: 0.3s; margin-left: 10px;">
                        Search
                    </button>
                </div>
            </div>

            <!-- Chart Section -->
            <div class="chart-wrapper">
                <canvas id="priceChart"></canvas>
            </div>

            <!-- Prediction Cards -->
            <div class="prediction-cards">
                <div class="p-card">
                    <div class="p-info">
                        <h3>Today</h3>
                        <p>1 Kg</p>
                    </div>
                    <h1 class="p-price" id="todayPrice"></h1>
                </div>

                <div class="p-card">
                    <div class="p-info">
                        <h3>Next week</h3>
                        <p>1 Kg</p>
                    </div>
                    <h1 class="p-price" id="weekPrice"></h1>
                </div>

                <div class="p-card">
                    <div class="p-info">
                        <h3>Next month</h3>
                        <p>1 Kg</p>
                    </div>
                    <h1 class="p-price" id="monthPrice"></h1>
                </div>
            </div>

            <p class="disclaimer">All this predictions are genarated by AI , and
                AI can make mistakes.</p>
        </div>

        <script type="module" src="main.js"></script>
    </body>
</html>
